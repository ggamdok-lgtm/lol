<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL 랜덤 챔피언 드래프트</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:system-ui,sans-serif;
    min-height:100vh;
}

header{
    text-align:center;
    padding:30px 20px;
}

h1{
    font-size:2rem;
}

.controls{
    display:flex;
    justify-content:center;
    margin:20px 0;
}

button{
    padding:14px 28px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
}

.main{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    max-width:1400px;
    margin:auto;
    padding:20px;
}

.team{
    background:#1e293b;
    border-radius:16px;
    padding:20px;
}

.team h2{
    text-align:center;
    margin-bottom:20px;
}

.player{
    display:flex;
    align-items:center;
    gap:12px;
    background:#334155;
    margin-bottom:10px;
    padding:10px;
    border-radius:10px;
}

.player img{
    width:72px;
    height:72px;
    border-radius:8px;
}

.loading{
    text-align:center;
    margin-top:30px;
}

@media(max-width:900px){
    .main{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<header>
    <h1>🎲 LoL 랜덤 챔피언 드래프트</h1>
    <p>최신 챔피언 자동 로드</p>
</header>

<div class="controls">
    <button id="drawBtn">챔피언 추첨</button>
</div>

<div id="loading" class="loading">
    챔피언 정보를 불러오는 중...
</div>

<div class="main">
    <div class="team">
        <h2>블루팀</h2>
        <div id="blue"></div>
    </div>

    <div class="team">
        <h2>레드팀</h2>
        <div id="red"></div>
    </div>
</div>

<script>

let champions = [];
let currentVersion = '';

async function loadChampions(){

    const versionRes =
      await fetch(
        'https://ddragon.leagueoflegends.com/api/versions.json'
      );

    const versions = await versionRes.json();

    currentVersion = versions[0];

    const championRes =
      await fetch(
        `https://ddragon.leagueoflegends.com/cdn/${currentVersion}/data/ko_KR/champion.json`
      );

    const championData = await championRes.json();

    champions = Object.values(championData.data);

    document.getElementById('loading').style.display='none';
}

function shuffle(arr){

    for(let i=arr.length-1;i>0;i--){

        const j=Math.floor(Math.random()*(i+1));

        [arr[i],arr[j]]=[arr[j],arr[i]];
    }

    return arr;
}

function createCard(champion, idx){

    const img =
      `https://ddragon.leagueoflegends.com/cdn/img/champion/loading/${champion.id}_0.jpg`;

    return `
        <div class="player">
            <img src="${img}">
            <div>
                <strong>소환사 ${idx+1}</strong><br>
                ${champion.name}
            </div>
        </div>
    `;
}

function draw(){

    if(champions.length < 10){
        alert('챔피언 정보를 아직 불러오는 중입니다.');
        return;
    }

    const pool = shuffle([...champions]);

    const blue = pool.slice(0,5);
    const red = pool.slice(5,10);

    document.getElementById('blue').innerHTML =
      blue.map(createCard).join('');

    document.getElementById('red').innerHTML =
      red.map(createCard).join('');
}

document
  .getElementById('drawBtn')
  .addEventListener('click', draw);

loadChampions();

</script>

</body>
</html>
