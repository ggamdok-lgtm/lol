<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롤 랜덤 챔피언 추첨기</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===================== -->
    <!-- 시작 화면 -->
    <!-- ===================== -->

    <section id="setupPage">

        <div class="container">

            <h1 class="title">
                LEAGUE OF LEGENDS
            </h1>

            <h2 class="subtitle">
                RANDOM CHAMPION PICKER
            </h2>

            <div class="option-area">

                <label class="checkbox-wrap">

                    <input
                        type="checkbox"
                        id="allowDuplicate"
                        checked
                    >

                    <span>
                        챔피언 중복 허용
                    </span>

                </label>

            </div>

            <div id="playerInputs">

                <!-- JS에서 생성 -->

            </div>

            <button id="startBtn">
                추첨 시작
            </button>

        </div>

    </section>

    <!-- ===================== -->
    <!-- 공개 화면 -->
    <!-- ===================== -->

    <section
        id="revealPage"
        class="hidden"
    >

        <div class="reveal-container">

            <div class="player-order">
                PLAYER
                <span id="currentPlayerIndex">
                    1
                </span>
                / 10
            </div>

            <h1
                id="revealPlayerName"
                class="reveal-player-name"
            >
                플레이어명
            </h1>

            <div
                id="countdown"
                class="countdown"
            >
                3
            </div>

            <div
                id="championRevealArea"
                class="champion-reveal-area"
            >

            </div>

            <div
                id="revealMessage"
                class="reveal-message"
            >

            </div>

        </div>

    </section>

    <!-- ===================== -->
    <!-- 최종 결과 화면 -->
    <!-- ===================== -->

    <section
        id="finalPage"
        class="hidden"
    >

        <div class="container">

            <h1 class="title">
                FINAL RESULT
            </h1>

            <div
                id="finalResultContainer"
                class="final-result-container"
            >

            </div>

            <div class="button-group">

                <button
                    id="restartBtn"
                >
                    다시 추첨
                </button>

            </div>

        </div>

    </section>

    <script src="app.js"></script>

</body>
</html>
